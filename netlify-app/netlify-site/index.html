<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BugBrief AI API</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #172033;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, calc(100% - 32px));
        padding: 32px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #ffffff;
      }

      a {
        color: #0f766e;
      }

      code {
        padding: 2px 6px;
        border-radius: 4px;
        background: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <main>
      <p>BugBrief AI</p>
      <h1>API is ready</h1>
      <p>
        Use <code>https://bugbrief-ai.netlify.app/health</code> to check the
        backend and <code>/api/generate-bug-report</code> from the Chrome
        extension.
      </p>
      <p><a href="/privacy/">Privacy policy</a></p>
    </main>
  </body>
</html>
