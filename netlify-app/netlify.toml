[build]
  command = "npm --workspace @bugbrief-ai/server run build"
  publish = "netlify-app/netlify-site"
  functions = "netlify-app/netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200
